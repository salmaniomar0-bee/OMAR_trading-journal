/* ============================================================================
   DATA LAYER — this is the only part you need to touch to plug in a backend.
   Right now everything is saved to the browser's localStorage (per-device,
   no login, no server). Each function returns a Promise so you can swap the
   body for a fetch() call to your own API/database without touching the UI.

   Example swap:
     async getTrades() {
       const res = await fetch('/api/trades');
       return res.json();
     }
     async saveTrades(trades) {
       await fetch('/api/trades', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(trades) });
     }
   ============================================================================ */
const DataStore = {
  async getTrades() { const raw = localStorage.getItem("edgelog_trades"); return raw ? JSON.parse(raw) : []; },
  async saveTrades(trades) { localStorage.setItem("edgelog_trades", JSON.stringify(trades)); },
  async getSettings() { const raw = localStorage.getItem("edgelog_settings"); return raw ? JSON.parse(raw) : null; },
  async saveSettings(settings) { localStorage.setItem("edgelog_settings", JSON.stringify(settings)); },
  async getFunding() { const raw = localStorage.getItem("edgelog_funding"); return raw ? JSON.parse(raw) : []; },
  async saveFunding(funding) { localStorage.setItem("edgelog_funding", JSON.stringify(funding)); },
};

/* ============================================================================
   AI COACH — calls YOUR backend, not Anthropic directly (browsers can't call
   api.anthropic.com safely; the key must stay server-side). Implement a
   POST /api/ai-coach endpoint that takes this JSON body, calls the Anthropic
   API with your own key, and returns { text: "..." }.
   ============================================================================ */
async function requestAICoach(payload) {
  const res = await fetch("/api/ai-coach", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("AI coach endpoint not available yet");
  const data = await res.json();
  return data.text || "";
}

function fmtMoney(n) { const v = Number(n) || 0; const s = v < 0 ? "-" : ""; return `${s}$${Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; }
function fmtPct(n) { if (!isFinite(n)) return "—"; return `${(Number(n) || 0).toFixed(1)}%`; }
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getMonday(dateStr) { const d = new Date(dateStr + "T00:00:00"); const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1); const m = new Date(d); m.setDate(diff); return m.toISOString().slice(0, 10); }
function weekdayName(dateStr) { return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { weekday: "long" }); }
function addDays(dateStr, n) { const d = new Date(dateStr + "T00:00:00"); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function cls(...a) { return a.filter(Boolean).join(" "); }

/* --------------------------------- computations --------------------------------- */

function computeStats(trades) {
  const wins = trades.filter((t) => Number(t.pnl) > 0);
  const losses = trades.filter((t) => Number(t.pnl) < 0);
  const totalProfit = wins.reduce((s, t) => s + Number(t.pnl), 0);
  const totalLoss = Math.abs(losses.reduce((s, t) => s + Number(t.pnl), 0));
  const netProfit = totalProfit - totalLoss;
  const winRate = trades.length ? (wins.length / trades.length) * 100 : 0;
  const avgWin = wins.length ? totalProfit / wins.length : 0;
  const avgLoss = losses.length ? totalLoss / losses.length : 0;
  const largestWin = wins.length ? Math.max(...wins.map((t) => Number(t.pnl))) : 0;
  const largestLoss = losses.length ? Math.min(...losses.map((t) => Number(t.pnl))) : 0;
  const profitFactor = totalLoss > 0 ? totalProfit / totalLoss : (totalProfit > 0 ? Infinity : 0);
  const sorted = [...trades].sort((a, b) => (a.date + (a.entryTime || "00:00")).localeCompare(b.date + (b.entryTime || "00:00")));
  let streakType = null, streakCount = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const pnl = Number(sorted[i].pnl);
    const type = pnl > 0 ? "win" : pnl < 0 ? "loss" : "breakeven";
    if (streakType === null) { streakType = type; streakCount = 1; } else if (type === streakType) streakCount++; else break;
  }
  const monthlyMap = {}, weeklyMap = {};
  sorted.forEach((t) => { const mk = t.date.slice(0, 7); monthlyMap[mk] = (monthlyMap[mk] || 0) + Number(t.pnl); const wk = getMonday(t.date); weeklyMap[wk] = (weeklyMap[wk] || 0) + Number(t.pnl); });
  const monthlyPerf = Object.entries(monthlyMap).sort(([a], [b]) => a.localeCompare(b)).map(([k, v]) => ({ label: k.slice(2), value: v }));
  const weeklyPerf = Object.entries(weeklyMap).sort(([a], [b]) => a.localeCompare(b)).map(([k, v]) => ({ label: k.slice(5), value: v }));
  const last14 = [];
  for (let i = 13; i >= 0; i--) { const d = addDays(todayISO(), -i); const dayTrades = sorted.filter((t) => t.date === d); last14.push({ label: d.slice(8), value: dayTrades.reduce((s, t) => s + Number(t.pnl), 0) }); }
  let running = 0;
  const equityCurve = sorted.map((t, i) => { running += Number(t.pnl); return { label: `${i + 1}`, value: running }; });
  return { totalProfit, totalLoss, netProfit, winRate, winCount: wins.length, lossCount: losses.length, avgWin, avgLoss, largestWin, largestLoss, profitFactor, streakType, streakCount, monthlyPerf, weeklyPerf, dailyPerf: last14, equityCurve, sorted };
}

function computeGoals(trades, settings, refDate = todayISO()) {
  const [year, month] = refDate.split("-").map(Number);
  const monthKey = refDate.slice(0, 7);
  const monthTrades = trades.filter((t) => t.date.slice(0, 7) === monthKey);
  const currentProfit = monthTrades.reduce((s, t) => s + Number(t.pnl), 0);
  const totalDays = daysInMonth(year, month - 1);
  const dayOfMonth = Number(refDate.slice(8, 10));
  const remainingDays = Math.max(totalDays - dayOfMonth + 1, 1);
  const monthlyTarget = Number(settings.monthlyTarget) || 0;
  const remaining = Math.max(monthlyTarget - currentProfit, 0);
  const dailyTarget = remaining > 0 ? remaining / remainingDays : 0;
  const weeklyTarget = monthlyTarget > 0 ? monthlyTarget / (totalDays / 7) : 0;
  const percentComplete = monthlyTarget > 0 ? Math.min((currentProfit / monthlyTarget) * 100, 100) : 0;
  const avgDailyProfit = dayOfMonth > 0 ? currentProfit / dayOfMonth : 0;
  let estCompletion = null;
  if (avgDailyProfit > 0 && currentProfit < monthlyTarget) estCompletion = addDays(refDate, Math.ceil(remaining / avgDailyProfit));
  const todayTrades = trades.filter((t) => t.date === refDate);
  const todayProfit = todayTrades.reduce((s, t) => s + Number(t.pnl), 0);
  const remainingToday = Math.max(dailyTarget - todayProfit, 0);
  let todayStatus = "none";
  if (dailyTarget > 0) todayStatus = todayProfit >= dailyTarget ? "reached" : todayProfit >= dailyTarget * 0.6 ? "almost" : "missed";
  else if (todayProfit > 0) todayStatus = "reached";
  const monday = getMonday(refDate);
  const weekTrades = trades.filter((t) => getMonday(t.date) === monday);
  const weekProfit = weekTrades.reduce((s, t) => s + Number(t.pnl), 0);
  return { monthlyTarget, currentProfit, remaining, remainingDays, dailyTarget, weeklyTarget, percentComplete, estCompletion, todayProfit, remainingToday, todayStatus, weekProfit, todayTrades, monthTrades, weekTrades };
}

function computeAnalysis(trades) {
  if (!trades.length) return null;
  const bySession = {}, byMarket = {}, byWeekday = {}, byHour = {}, byEmotion = {}, byStrategy = { yes: [], no: [] };
  const smcStats = {};
  SMC_TAGS.forEach((s) => (smcStats[s.key] = { count: 0, pnl: 0, wins: 0 }));
  let rrSum = 0, rrCount = 0, holdSum = 0, holdCount = 0;
  trades.forEach((t) => {
    const pnl = Number(t.pnl);
    if (t.session) { (bySession[t.session] = bySession[t.session] || []).push(pnl); }
    if (t.market) { (byMarket[t.market] = byMarket[t.market] || []).push(pnl); }
    const wd = weekdayName(t.date); (byWeekday[wd] = byWeekday[wd] || []).push(pnl);
    if (t.entryTime) { const hr = t.entryTime.split(":")[0]; (byHour[hr] = byHour[hr] || []).push(pnl); }
    if (t.emotion) (byEmotion[t.emotion] = byEmotion[t.emotion] || []).push(pnl);
    if (t.followedStrategy === "yes" || t.followedStrategy === "no") byStrategy[t.followedStrategy].push(pnl);
    if (t.rr) { const n = parseFloat(t.rr); if (!isNaN(n)) { rrSum += n; rrCount++; } }
    if (t.entryTime && t.exitTime) {
      const [eh, em] = t.entryTime.split(":").map(Number); const [xh, xm] = t.exitTime.split(":").map(Number);
      let mins = (xh * 60 + xm) - (eh * 60 + em); if (mins < 0) mins += 1440; holdSum += mins; holdCount++;
    }
    SMC_TAGS.forEach((s) => { if (t.smc && t.smc[s.key]) { smcStats[s.key].count++; smcStats[s.key].pnl += pnl; if (pnl > 0) smcStats[s.key].wins++; } });
  });
  const rank = (obj, best) => {
    const entries = Object.entries(obj).map(([k, arr]) => ({ key: k, net: arr.reduce((a, b) => a + b, 0), count: arr.length, winRate: (arr.filter((v) => v > 0).length / arr.length) * 100 }));
    if (!entries.length) return null;
    entries.sort((a, b) => best ? b.net - a.net : a.net - b.net);
    return entries[0];
  };
  return {
    bestSession: rank(bySession, true), bestMarket: rank(byMarket, true), worstMarket: rank(byMarket, false),
    bestWeekday: rank(byWeekday, true), worstWeekday: rank(byWeekday, false), bestHour: rank(byHour, true),
    avgRR: rrCount ? rrSum / rrCount : 0, avgHoldMins: holdCount ? holdSum / holdCount : 0,
    byEmotion, byStrategy,
    smcStats: Object.entries(smcStats).filter(([, v]) => v.count > 0).map(([k, v]) => ({ key: k, label: SMC_TAGS.find((s) => s.key === k).label, ...v, winRate: (v.wins / v.count) * 100 })),
  };
}

/* ------------------------------- simple charts (no deps) -------------------------- */

function SimpleBarChart({ data, height = 180 }) {
  if (!data || !data.length) return null;
  const vals = data.map((d) => d.value);
  const max = Math.max(0, ...vals), min = Math.min(0, ...vals);
  const range = max - min || 1;
  const zeroY = ((max - 0) / range) * height;
  return (
    <div className="w-full overflow-x-auto no-scrollbar">
      <svg width={Math.max(data.length * 34, 280)} height={height + 24} className="min-w-full">
        <line x1="0" y1={zeroY} x2="100%" y2={zeroY} stroke="#1e293b" strokeWidth="1" />
        {data.map((d, i) => {
          const barH = (Math.abs(d.value) / range) * height;
          const y = d.value >= 0 ? zeroY - barH : zeroY;
          return (
            <g key={i} transform={`translate(${i * 34 + 6},0)`}>
              <rect x="0" y={y} width="18" height={Math.max(barH, 1)} rx="3" fill={d.value >= 0 ? "#34d399" : "#f87171"} />
              <text x="9" y={height + 16} fontSize="9" fill="#64748b" textAnchor="middle">{d.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function SimpleLineChart({ data, height = 180, color = "#fbbf24" }) {
  if (!data || data.length < 2) return <div className="text-slate-600 text-sm py-10 text-center">Not enough data yet.</div>;
  const vals = data.map((d) => d.value);
  const max = Math.max(...vals), min = Math.min(...vals);
  const range = max - min || 1;
  const width = 100;
  const pts = data.map((d, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((d.value - min) / range) * height;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

function SimpleDonut({ wins, losses, size = 150 }) {
  const total = wins + losses;
  const stroke = 16, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const winFrac = total ? wins / total : 0;
  return (
    <svg width={size} height={size} className="-rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} stroke="#f87171" strokeWidth={stroke} fill="none" />
      <circle cx={size / 2} cy={size / 2} r={r} stroke="#34d399" strokeWidth={stroke} fill="none"
        strokeDasharray={c} strokeDashoffset={c - winFrac * c} strokeLinecap="butt" />
    </svg>
  );
}

}
function Ring({ value, size = 96, stroke = 9, colorClass = "text-amber-400" }) {
  const pct = Math.max(0, Math.min(100, value || 0));
  const r = (size - stroke) / 2, c = 2 * Math.PI * r, offset = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} className="-rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} strokeWidth={stroke} className="text-slate-800" stroke="currentColor" fill="none" />
      <circle cx={size / 2} cy={size / 2} r={r} strokeWidth={stroke} className={cls(colorClass, "transition-all duration-700")} stroke="currentColor" fill="none" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" />
    </svg>
  );
}
function Card({ children, className = "" }) { return <div className={cls("bg-slate-900 border border-slate-800 rounded-xl p-4", className)}>{children}</div>; }
function StatTile({ label, value, valueClass = "text-slate-100", icon }) {
  return (
    <Card className="flex flex-col gap-1">
      <div className="flex items-center justify-between text-slate-500 text-xs uppercase tracking-wide">
        <span>{label}</span>{icon && <Icon name={icon} size={14} />}
      </div>
      <div className={cls("font-mono text-lg font-semibold", valueClass)}>{value}</div>
    </Card>
  );
}
function Badge({ children, className = "" }) { return <span className={cls("px-2 py-0.5 rounded-full text-xs font-medium", className)}>{children}</span>; }
function EmotionIcon({ emotionKey, size = 14 }) { const e = EMOTIONS.find((x) => x.key === emotionKey); if (!e) return null; return <Icon name={e.icon} size={size} className={e.color} />; }
function EmptyState({ icon, title, hint }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-14 text-slate-500 gap-2">
      <Icon name={icon} size={28} className="text-slate-700" />
      <div className="text-slate-300 font-medium">{title}</div>
      {hint && <div className="text-sm max-w-xs">{hint}</div>}
    </div>
  );
}

/* ------------------------------------- app -------------------------------------- */

function App() {
  const [tab, setTab] = useState("dashboard");
  const [trades, setTrades] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [funding, setFunding] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [editingTrade, setEditingTrade] = useState(null);

  useEffect(() => {
    (async () => {
      const [t, s, f] = await Promise.all([DataStore.getTrades(), DataStore.getSettings(), DataStore.getFunding()]);
      setTrades(t || []);
      setSettings(s ? { ...DEFAULT_SETTINGS, ...s } : DEFAULT_SETTINGS);
      setFunding(f || []);
      setLoaded(true);
    })();
  }, []);

  const persistTrades = useCallback(async (next) => { setTrades(next); await DataStore.saveTrades(next); }, []);
  const persistSettings = useCallback(async (next) => { setSettings(next); await DataStore.saveSettings(next); }, []);
  const persistFunding = useCallback(async (next) => { setFunding(next); await DataStore.saveFunding(next); }, []);

  const showToast = (msg, kind = "info") => { setToast({ msg, kind }); setTimeout(() => setToast(null), 3500); };

  const stats = useMemo(() => computeStats(trades), [trades]);
  const goals = useMemo(() => computeGoals(trades, settings), [trades, settings]);
  const analysis = useMemo(() => computeAnalysis(trades), [trades]);

  const dailyBreach = settings.maxDailyLoss > 0 && goals.todayProfit < 0 && Math.abs(goals.todayProfit) >= Number(settings.maxDailyLoss);
  const weeklyBreach = settings.maxWeeklyLoss > 0 && goals.weekProfit < 0 && Math.abs(goals.weekProfit) >= Number(settings.maxWeeklyLoss);
  const monthlyBreach = settings.maxMonthlyLoss > 0 && goals.currentProfit < 0 && Math.abs(goals.currentProfit) >= Number(settings.maxMonthlyLoss);
  const tradingLocked = settings.lockOnBreach && (dailyBreach || weeklyBreach || monthlyBreach);

  function openAddTrade() { if (tradingLocked) { showToast("Trading is locked — a risk limit was breached.", "danger"); return; } setEditingTrade(null); setModalOpen(true); }
  function openEditTrade(t) { setEditingTrade(t); setModalOpen(true); }
  function saveTrade(trade) {
    if (trade.id) { persistTrades(trades.map((t) => (t.id === trade.id ? trade : t))); showToast("Trade updated."); }
    else { persistTrades([...trades, { ...trade, id: uid() }]); showToast("Trade saved."); }
    setModalOpen(false);
  }
  function deleteTrade(id) { persistTrades(trades.filter((t) => t.id !== id)); showToast("Trade deleted."); }

  if (!loaded) return <div className="h-screen w-full flex items-center justify-center bg-slate-950 text-slate-400"><Icon name="loader" size={18} className="spin mr-2" /> Loading your journal…</div>;

  return (
    <div className="h-screen w-full bg-slate-950 text-slate-100 flex font-sans relative overflow-hidden">
      <aside className="hidden md:flex w-56 shrink-0 border-r border-slate-800 flex-col">
        <div className="px-5 py-5 border-b border-slate-800">
          <div className="text-amber-400 font-bold text-lg tracking-tight">EdgeLog</div>
          <div className="text-slate-500 text-xs">Trading Journal</div>
        </div>
        <nav className="flex-1 py-3">
          {TABS.map((t) => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className={cls("w-full flex items-center gap-3 px-5 py-2.5 text-sm transition-colors",
                tab === t.key ? "bg-slate-900 text-amber-400 border-r-2 border-amber-400" : "text-slate-400 hover:text-slate-200 hover:bg-slate-900/60")}>
              <Icon name={t.icon} size={16} /> {t.label}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-slate-800">
          <button onClick={openAddTrade} disabled={tradingLocked}
            className="w-full flex items-center justify-center gap-2 bg-amber-400 hover:bg-amber-300 disabled:bg-slate-800 disabled:text-slate-600 text-slate-950 font-semibold text-sm py-2.5 rounded-lg">
            <Icon name="plus" size={16} /> New Trade
          </button>
        </div>
      </aside>

      <div className="flex-1 flex flex-col overflow-hidden">
        <header className="md:hidden flex items-center justify-between px-4 py-3 border-b border-slate-800">
          <div className="text-amber-400 font-bold tracking-tight">EdgeLog</div>
          <button onClick={openAddTrade} disabled={tradingLocked}
            className="flex items-center gap-1 bg-amber-400 disabled:bg-slate-800 text-slate-950 disabled:text-slate-600 font-semibold text-xs px-3 py-1.5 rounded-lg">
            <Icon name="plus" size={14} /> Trade
          </button>
        </header>

        {(dailyBreach || weeklyBreach || monthlyBreach) && (
          <div className="bg-red-500/10 border-b border-red-500/30 px-4 py-2.5 flex items-center gap-2 text-red-400 text-sm">
            <Icon name="alertTriangle" size={16} />
            {monthlyBreach ? "Monthly max loss limit breached." : weeklyBreach ? "Weekly max loss limit breached." : "Daily max loss limit breached."}
            {settings.lockOnBreach && " New trades are locked."}
          </div>
        )}

        <main className="flex-1 overflow-y-auto p-4 md:p-6 pb-20 md:pb-6">
          {tab === "dashboard" && <Dashboard goals={goals} stats={stats} />}
          {tab === "journal" && <Journal trades={trades} onEdit={openEditTrade} onDelete={deleteTrade} onAdd={openAddTrade} locked={tradingLocked} />}
          {tab === "calendar" && <CalendarView trades={trades} />}
          {tab === "stats" && <Statistics stats={stats} />}
          {tab === "analysis" && <Analysis analysis={analysis} />}
          {tab === "coach" && <AICoach trades={trades} stats={stats} analysis={analysis} />}
          {tab === "funding" && <Funding funding={funding} setFunding={persistFunding} trades={trades} stats={stats} />}
          {tab === "settings" && (
            <SettingsPanel settings={settings} setSettings={persistSettings} trades={trades} funding={funding}
              onImport={(data) => { if (data.trades) persistTrades(data.trades); if (data.settings) persistSettings({ ...DEFAULT_SETTINGS, ...data.settings }); if (data.funding) persistFunding(data.funding); showToast("Data imported."); }}
              showToast={showToast} />
          )}
        </main>
      </div>

      <nav className="md:hidden absolute bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 z-30">
        <div className="flex overflow-x-auto no-scrollbar">
          {TABS.map((t) => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className={cls("shrink-0 w-[76px] flex flex-col items-center justify-center gap-1 py-2.5 text-[10px] leading-tight whitespace-nowrap", tab === t.key ? "text-amber-400" : "text-slate-500")}>
              <Icon name={t.icon} size={18} /><span>{t.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {modalOpen && <TradeModal trade={editingTrade} onClose={() => setModalOpen(false)} onSave={saveTrade} funding={funding} />}

      {toast && (
        <div className={cls("absolute top-4 right-4 z-50 px-4 py-2.5 rounded-lg shadow-xl text-sm font-medium", toast.kind === "danger" ? "bg-red-500 text-white" : "bg-slate-800 text-slate-100 border border-slate-700")}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

/* ------------------------------------- journal ------------------------------------ */

function Journal({ trades, onEdit, onDelete, onAdd, locked }) {
  const [filters, setFilters] = useState({ market: "", session: "", result: "", search: "" });
  const filtered = trades.filter((t) => {
    if (filters.market && t.market !== filters.market) return false;
    if (filters.session && t.session !== filters.session) return false;
    if (filters.result === "win" && Number(t.pnl) <= 0) return false;
    if (filters.result === "loss" && Number(t.pnl) >= 0) return false;
    if (filters.search && !(t.notes || "").toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => (b.date + (b.entryTime || "")).localeCompare(a.date + (a.entryTime || "")));
  const uniqueMarkets = [...new Set(trades.map((t) => t.market).filter(Boolean))];

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-center justify-between">
        <h1 className="text-xl font-bold tracking-tight">Journal</h1>
        <button onClick={onAdd} disabled={locked} className="hidden md:flex items-center gap-2 bg-amber-400 hover:bg-amber-300 disabled:bg-slate-800 disabled:text-slate-600 text-slate-950 font-semibold text-sm px-3 py-2 rounded-lg">
          <Icon name="plus" size={16} /> New Trade
        </button>
      </div>
      <Card className="flex flex-wrap gap-2 items-center">
        <Icon name="filter" size={14} className="text-slate-500" />
        <select value={filters.market} onChange={(e) => setFilters({ ...filters, market: e.target.value })} className="bg-slate-800 text-slate-200 text-sm rounded-lg px-2 py-1.5 border border-slate-700">
          <option value="">All markets</option>{(uniqueMarkets.length ? uniqueMarkets : MARKETS).map((m) => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filters.session} onChange={(e) => setFilters({ ...filters, session: e.target.value })} className="bg-slate-800 text-slate-200 text-sm rounded-lg px-2 py-1.5 border border-slate-700">
          <option value="">All sessions</option>{SESSIONS.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filters.result} onChange={(e) => setFilters({ ...filters, result: e.target.value })} className="bg-slate-800 text-slate-200 text-sm rounded-lg px-2 py-1.5 border border-slate-700">
          <option value="">Win / Loss</option><option value="win">Wins</option><option value="loss">Losses</option>
        </select>
        <div className="flex items-center gap-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
          <Icon name="search" size={14} className="text-slate-500" />
          <input value={filters.search} onChange={(e) => setFilters({ ...filters, search: e.target.value })} placeholder="Search notes…" className="bg-transparent text-sm text-slate-200 outline-none flex-1" />
        </div>
      </Card>
      {!filtered.length && <EmptyState icon="book" title="No trades found" hint="Add a trade or adjust your filters." />}
      <div className="flex flex-col gap-2">
        {filtered.map((t) => (
          <Card key={t.id} className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-3 min-w-0">
              <div className={cls("w-1.5 h-10 rounded-full", Number(t.pnl) >= 0 ? "bg-emerald-400" : "bg-red-400")} />
              <div className="min-w-0">
                <div className="flex items-center gap-2 text-sm">
                  <span className="font-semibold">{t.market}</span>
                  <Badge className={t.direction === "Buy" ? "bg-emerald-500/10 text-emerald-400" : "bg-red-500/10 text-red-400"}>{t.direction}</Badge>
                  <span className="text-slate-500">{t.session}</span><EmotionIcon emotionKey={t.emotion} />
                </div>
                <div className="text-slate-500 text-xs">{t.date} {t.entryTime ? `· ${t.entryTime}` : ""} {t.rr ? `· RR ${t.rr}` : ""}</div>
              </div>
            </div>
            <div className="flex items-center gap-3 shrink-0">
              <div className={cls("font-mono font-semibold text-sm", Number(t.pnl) >= 0 ? "text-emerald-400" : "text-red-400")}>{fmtMoney(t.pnl)}</div>
              <button onClick={() => onEdit(t)} className="text-slate-500 hover:text-amber-400"><Icon name="edit" size={15} /></button>
              <button onClick={() => onDelete(t.id)} className="text-slate-500 hover:text-red-400"><Icon name="trash" size={15} /></button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ------------------------------------ trade modal ---------------------------------- */

        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-800 shrink-0">

            <div><label className={labelClass}>Exit Price</label><input type="number" step="any" value={form.exit} onChange={(e) => set("exit", e.target.value)} className={inputClass} /></div>
            <div><label className={labelClass}>Lot Size</label><input type="number" step="any" value={form.lotSize} onChange={(e) => set("lotSize", e.target.value)} className={inputClass} /></div>
            <div><label className={labelClass}>Profit / Loss ($)</label><input type="number" step="any" required value={form.pnl} onChange={(e) => set("pnl", e.target.value)} className={inputClass} /></div>
            <div><label className={labelClass}>Risk / Reward</label><input type="text" placeholder="e.g. 1:3" value={form.rr} onChange={(e) => set("rr", e.target.value)} className={inputClass} /></div>

          {!!funding.length && (

            <label className={labelClass}>Did you follow your strategy?</label>

          <div className="flex gap-2 pt-2">
            <button type="button" onClick={onClose} className="flex-1 py-2.5 rounded-lg border border-slate-700 text-slate-300 text-sm">Cancel</button>
            <button type="submit" className="flex-1 py-2.5 rounded-lg bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold text-sm">Save Trade</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ------------------------------------- calendar ------------------------------------ */

function CalendarView({ trades }) {
  const [cursor, setCursor] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(null);
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7;
  const total = daysInMonth(year, month);
  const dayMap = {};
  trades.forEach((t) => { dayMap[t.date] = (dayMap[t.date] || 0) + Number(t.pnl); });
  const cells = []; for (let i = 0; i < startOffset; i++) cells.push(null); for (let d = 1; d <= total; d++) cells.push(d);
  const dayTrades = selectedDay ? trades.filter((t) => t.date === selectedDay) : [];

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-center justify-between">
        <h1 className="text-xl font-bold tracking-tight">Calendar</h1>
        <div className="flex items-center gap-2">
          <button onClick={() => setCursor(new Date(year, month - 1, 1))} className="p-1.5 rounded-lg border border-slate-800 text-slate-400"><Icon name="chevronLeft" size={16} /></button>
          <span className="text-sm font-medium w-32 text-center">{first.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</span>
          <button onClick={() => setCursor(new Date(year, month + 1, 1))} className="p-1.5 rounded-lg border border-slate-800 text-slate-400"><Icon name="chevronRight" size={16} /></button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1.5 text-center text-xs text-slate-500 mb-1">{["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map((d) => <div key={d}>{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1.5">
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          const val = dayMap[dateStr];
          const color = val === undefined ? "bg-slate-900 border-slate-800 text-slate-600" : val > 0 ? "bg-emerald-500/10 border-emerald-500/40 text-emerald-400" : val < 0 ? "bg-red-500/10 border-red-500/40 text-red-400" : "bg-slate-800 border-slate-700 text-slate-400";
          return (
            <button key={i} onClick={() => setSelectedDay(dateStr)} className={cls("aspect-square rounded-lg border flex flex-col items-center justify-center text-xs gap-0.5 hover:opacity-80", color)}>
              <span>{d}</span>{val !== undefined && <span className="font-mono text-[10px]">{fmtMoney(val)}</span>}
            </button>
          );
        })}
      </div>
      {selectedDay && (
        <Card>
          <div className="flex items-center justify-between mb-2"><div className="font-medium">{selectedDay}</div><button onClick={() => setSelectedDay(null)} className="text-slate-500"><Icon name="x" size={16} /></button></div>
          {!dayTrades.length && <div className="text-slate-500 text-sm">No trades this day.</div>}
          <div className="flex flex-col gap-2">
            {dayTrades.map((t) => (
              <div key={t.id} className="flex items-center justify-between text-sm border-t border-slate-800 pt-2 first:border-0 first:pt-0">
                <span>{t.market} <span className="text-slate-500">· {t.session}</span></span>
                <span className={cls("font-mono", Number(t.pnl) >= 0 ? "text-emerald-400" : "text-red-400")}>{fmtMoney(t.pnl)}</span>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

/* ------------------------------------ statistics ----------------------------------- */

function Statistics({ stats }) {
  return (
    <div className="flex flex-col gap-5">
      <h1 className="text-xl font-bold tracking-tight">Statistics</h1>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <StatTile label="Total Profit" value={fmtMoney(stats.totalProfit)} valueClass="text-emerald-400" />
        <StatTile label="Total Loss" value={fmtMoney(-stats.totalLoss)} valueClass="text-red-400" />
        <StatTile label="Net Profit" value={fmtMoney(stats.netProfit)} valueClass={stats.netProfit >= 0 ? "text-emerald-400" : "text-red-400"} />
        <StatTile label="Win Rate" value={fmtPct(stats.winRate)} />
        <StatTile label="Winning Trades" value={stats.winCount} valueClass="text-emerald-400" />
        <StatTile label="Losing Trades" value={stats.lossCount} valueClass="text-red-400" />
        <StatTile label="Average Win" value={fmtMoney(stats.avgWin)} valueClass="text-emerald-400" />
        <StatTile label="Average Loss" value={fmtMoney(-stats.avgLoss)} valueClass="text-red-400" />
        <StatTile label="Largest Win" value={fmtMoney(stats.largestWin)} valueClass="text-emerald-400" />
        <StatTile label="Largest Loss" value={fmtMoney(stats.largestLoss)} valueClass="text-red-400" />
        <StatTile label="Profit Factor" value={isFinite(stats.profitFactor) ? stats.profitFactor.toFixed(2) : "∞"} />
        <StatTile label={stats.streakType === "loss" ? "Losing Streak" : "Winning Streak"} value={stats.streakCount || 0} />
      </div>
      <div className="grid md:grid-cols-2 gap-4">
        <Card>
          <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Win / Loss Split</div>
          {stats.winCount + stats.lossCount > 0 ? (
            <div className="flex items-center gap-6">
              <SimpleDonut wins={stats.winCount} losses={stats.lossCount} />
              <div className="flex flex-col gap-2 text-sm">
                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-emerald-400" /> Wins: {stats.winCount}</div>
                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-red-400" /> Losses: {stats.lossCount}</div>
              </div>
            </div>
          ) : <EmptyState icon="bar" title="No data yet" />}
        </Card>
        <Card>
          <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Last 14 Days</div>
          {stats.dailyPerf.some((d) => d.value !== 0) ? <SimpleBarChart data={stats.dailyPerf} /> : <EmptyState icon="bar" title="No data yet" />}
        </Card>
        <Card>
          <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Monthly Performance</div>
          {stats.monthlyPerf.length ? <SimpleBarChart data={stats.monthlyPerf} /> : <EmptyState icon="bar" title="No data yet" />}
        </Card>
        <Card>
          <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Weekly Performance</div>
          {stats.weeklyPerf.length ? <SimpleBarChart data={stats.weeklyPerf} /> : <EmptyState icon="bar" title="No data yet" />}
        </Card>
      </div>
    </div>
  );
}

/* ------------------------------------- analysis ------------------------------------ */

function Analysis({ analysis }) {
  if (!analysis) return <div className="flex flex-col gap-4"><h1 className="text-xl font-bold tracking-tight">Analysis</h1><EmptyState icon="target" title="No trades yet" hint="Log trades to unlock automatic analysis." /></div>;
  const RankCard = ({ title, data, suffix = "" }) => (
    <Card>
      <div className="text-slate-500 text-xs uppercase tracking-wide mb-1">{title}</div>
      {data ? <><div className="font-semibold text-lg">{data.key}{suffix}</div><div className="text-sm text-slate-500 font-mono">{fmtMoney(data.net)} · {fmtPct(data.winRate)} WR · {data.count} trades</div></> : <div className="text-slate-600 text-sm">—</div>}
    </Card>
  );
  return (
    <div className="flex flex-col gap-5">
      <h1 className="text-xl font-bold tracking-tight">Analysis</h1>
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
        <RankCard title="Best Session" data={analysis.bestSession} />
        <RankCard title="Best Market" data={analysis.bestMarket} />
        <RankCard title="Worst Market" data={analysis.worstMarket} />
        <RankCard title="Best Weekday" data={analysis.bestWeekday} />
        <RankCard title="Worst Weekday" data={analysis.worstWeekday} />
        <RankCard title="Best Entry Hour" data={analysis.bestHour} suffix=":00" />
        <StatTile label="Average RR" value={analysis.avgRR ? analysis.avgRR.toFixed(2) : "—"} />
        <StatTile label="Avg Holding Time" value={analysis.avgHoldMins ? `${Math.round(analysis.avgHoldMins)} min` : "—"} />
      </div>
      <Card>
        <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Psychology Breakdown</div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          {EMOTIONS.map((em) => {
            const arr = analysis.byEmotion[em.key];
            const net = arr ? arr.reduce((a, b) => a + b, 0) : null;
            const wr = arr ? (arr.filter((v) => v > 0).length / arr.length) * 100 : null;
            return (
              <div key={em.key} className="flex items-center gap-2 bg-slate-800/50 rounded-lg px-3 py-2">
                <Icon name={em.icon} size={16} className={em.color} />
                <div className="text-sm"><div>{em.label}</div><div className="text-xs text-slate-500 font-mono">{arr ? `${fmtMoney(net)} · ${fmtPct(wr)}` : "no data"}</div></div>
              </div>
            );
          })}
        </div>
        <div className="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-800">
          {["yes", "no"].map((v) => {
            const arr = analysis.byStrategy[v]; const net = arr.reduce((a, b) => a + b, 0);
            const wr = arr.length ? (arr.filter((x) => x > 0).length / arr.length) * 100 : 0;
            return <div key={v} className="text-sm"><div className="text-slate-500">{v === "yes" ? "Followed Strategy" : "Didn't Follow Strategy"}</div><div className="font-mono">{arr.length ? `${fmtMoney(net)} · ${fmtPct(wr)} WR (${arr.length})` : "no data"}</div></div>;
          })}
        </div>
      </Card>
      <Card>
        <div className="text-slate-500 text-xs uppercase tracking-wide mb-3">Smart Money Concepts Performance</div>
        {analysis.smcStats.length ? (
          <div className="flex flex-col gap-2">
            {analysis.smcStats.sort((a, b) => b.pnl - a.pnl).map((s) => (
              <div key={s.key} className="flex items-center justify-between text-sm border-t border-slate-800 pt-2 first:border-0 first:pt-0">
                <span>{s.label} <span className="text-slate-600">({s.count})</span></span>
                <span className="font-mono"><span className={s.pnl >= 0 ? "text-emerald-400" : "text-red-400"}>{fmtMoney(s.pnl)}</span><span className="text-slate-600"> · {fmtPct(s.winRate)} WR</span></span>
              </div>
            ))}
          </div>
        ) : <div className="text-slate-600 text-sm">Tag trades with SMC concepts to see performance here.</div>}
      </Card>
    </div>
  );
}

/* ------------------------------------- AI coach ------------------------------------ */

function AICoach({ trades, stats, analysis }) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState("");
  const [error, setError] = useState("");

  async function runAnalysis() {
    setLoading(true); setError(""); setResult("");
    try {
      const payload = {
        totalTrades: trades.length, netProfit: stats.netProfit, winRate: stats.winRate, profitFactor: stats.profitFactor,
        avgWin: stats.avgWin, avgLoss: stats.avgLoss, largestWin: stats.largestWin, largestLoss: stats.largestLoss,
        bestSession: analysis?.bestSession, bestMarket: analysis?.bestMarket, worstMarket: analysis?.worstMarket,
        bestWeekday: analysis?.bestWeekday, worstWeekday: analysis?.worstWeekday, avgRR: analysis?.avgRR,
        recentTrades: trades.slice(-30).map((t) => ({ date: t.date, market: t.market, direction: t.direction, pnl: t.pnl, rr: t.rr, session: t.session, emotion: t.emotion, followedStrategy: t.followedStrategy, notes: t.notes })),
      };
      const text = await requestAICoach(payload);
      setResult(text || "No response received.");
    } catch (e) {
      setError("The AI coach backend isn't connected yet. See the code comments at the top of this file (requestAICoach / POST /api/ai-coach) for how to wire it up to your server.");
    } finally { setLoading(false); }
  }

  return (
    <div className="flex flex-col gap-5">
      <div className="flex items-center justify-between">
        <h1 className="text-xl font-bold tracking-tight">AI Trading Coach</h1>
        <button onClick={runAnalysis} disabled={loading || !trades.length} className="flex items-center gap-2 bg-amber-400 hover:bg-amber-300 disabled:bg-slate-800 disabled:text-slate-600 text-slate-950 font-semibold text-sm px-4 py-2 rounded-lg">
          <Icon name={loading ? "loader" : "sparkle"} size={16} className={loading ? "spin" : ""} /> {loading ? "Analyzing…" : "Analyze My Trading"}
        </button>
      </div>
      {!trades.length && <EmptyState icon="brain" title="No trades to analyze yet" hint="Log a few trades, then come back for personalized coaching." />}
      {error && <div className="text-amber-300 text-sm bg-amber-500/10 border border-amber-500/30 rounded-lg px-4 py-3">{error}</div>}
      {result && <Card className="whitespace-pre-wrap leading-relaxed text-sm text-slate-200">{result}</Card>}
      {!result && !error && trades.length > 0 && !loading && <EmptyState icon="brain" title="Ready when you are" hint="Tap “Analyze My Trading” for a breakdown of your mistakes, edge, and risk habits." />}
    </div>
  );
}

/* ------------------------------------- funding ------------------------------------- */

function Funding({ funding, setFunding, trades, stats }) {
  const [formOpen, setFormOpen] = useState(false);
  const [form, setForm] = useState({ name: "", accountSize: 10000, profitTargetPct: 8, maxDailyLossPct: 5, maxOverallLossPct: 10, startDate: todayISO(), evalDays: 30 });

  function addChallenge(e) { e.preventDefault(); setFunding([...funding, { ...form, id: uid() }]); setForm({ name: "", accountSize: 10000, profitTargetPct: 8, maxDailyLossPct: 5, maxOverallLossPct: 10, startDate: todayISO(), evalDays: 30 }); setFormOpen(false); }
  function removeChallenge(id) { setFunding(funding.filter((f) => f.id !== id)); }

  function estimate(challenge) {
    const linked = trades.filter((t) => t.challengeId === challenge.id);
    const currentProfit = linked.reduce((s, t) => s + Number(t.pnl), 0);
    const profitTarget = challenge.accountSize * (challenge.profitTargetPct / 100);
    const remainingProfit = Math.max(profitTarget - currentProfit, 0);
    const maxOverallLossAmt = challenge.accountSize * (challenge.maxOverallLossPct / 100);
    const lossSoFar = Math.max(-currentProfit, 0);
    const remainingDrawdown = Math.max(maxOverallLossAmt - lossSoFar, 0);
    const start = new Date(challenge.startDate + "T00:00:00");
    const end = new Date(start); end.setDate(end.getDate() + (Number(challenge.evalDays) || 30));
    const daysRemaining = Math.max(Math.ceil((end - new Date()) / 86400000), 0);
    const dailyTargetNeeded = daysRemaining > 0 ? remainingProfit / daysRemaining : (remainingProfit > 0 ? Infinity : 0);
    const daysTraded = new Set(linked.map((t) => t.date)).size || 1;
    const avgDailyProfit = currentProfit / daysTraded;
    let probability;
    if (remainingProfit <= 0) probability = 95; else if (remainingDrawdown <= 0) probability = 2;
    else { const ratio = avgDailyProfit > 0 ? Math.min(avgDailyProfit / (dailyTargetNeeded || 1), 2) : 0; const winRateFactor = (stats.winRate || 0) / 100; probability = Math.max(2, Math.min(95, ratio * 55 + winRateFactor * 45)); }
    return { currentProfit, profitTarget, remainingProfit, remainingDrawdown, daysRemaining, dailyTargetNeeded, probability, tradeCount: linked.length };
  }

  const inputClass = "w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 outline-none focus:border-amber-400";
  const labelClass = "text-xs text-slate-500 mb-1 block";

  return (
    <div className="flex flex-col gap-5">
      <div className="flex items-center justify-between">
        <h1 className="text-xl font-bold tracking-tight">Funding Challenges</h1>
        <button onClick={() => setFormOpen(!formOpen)} className="flex items-center gap-2 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold text-sm px-3 py-2 rounded-lg"><Icon name="plus" size={16} /> New Challenge</button>
      </div>
      {formOpen && (
        <Card>
          <form onSubmit={addChallenge} className="grid grid-cols-2 md:grid-cols-3 gap-3">
            <div className="col-span-2 md:col-span-3"><label className={labelClass}>Name</label><input required value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className={inputClass} placeholder="e.g. FTMO 100k Phase 1" /></div>
            <div><label className={labelClass}>Account Size ($)</label><input type="number" value={form.accountSize} onChange={(e) => setForm({ ...form, accountSize: Number(e.target.value) })} className={inputClass} /></div>
            <div><label className={labelClass}>Profit Target (%)</label><input type="number" value={form.profitTargetPct} onChange={(e) => setForm({ ...form, profitTargetPct: Number(e.target.value) })} className={inputClass} /></div>
            <div><label className={labelClass}>Max Daily Loss (%)</label><input type="number" value={form.maxDailyLossPct} onChange={(e) => setForm({ ...form, maxDailyLossPct: Number(e.target.value) })} className={inputClass} /></div>
            <div><label className={labelClass}>Max Overall Loss (%)</label><input type="number" value={form.maxOverallLossPct} onChange={(e) => setForm({ ...form, maxOverallLossPct: Number(e.target.value) })} className={inputClass} /></div>
            <div><label className={labelClass}>Start Date</label><input type="date" value={form.startDate} onChange={(e) => setForm({ ...form, startDate: e.target.value })} className={inputClass} /></div>
            <div><label className={labelClass}>Evaluation Days</label><input type="number" value={form.evalDays} onChange={(e) => setForm({ ...form, evalDays: Number(e.target.value) })} className={inputClass} /></div>
            <div className="col-span-2 md:col-span-3 flex gap-2 pt-1">
              <button type="button" onClick={() => setFormOpen(false)} className="flex-1 py-2 rounded-lg border border-slate-700 text-slate-300 text-sm">Cancel</button>
              <button type="submit" className="flex-1 py-2 rounded-lg bg-amber-400 text-slate-950 font-semibold text-sm">Create Challenge</button>
            </div>
          </form>
        </Card>
      )}
      {!funding.length && <EmptyState icon="wallet" title="No funding challenges yet" hint="Create one to track profit targets, drawdown limits, and pass probability." />}
      <div className="grid md:grid-cols-2 gap-4">
        {funding.map((f) => {
          const e = estimate(f);
          return (
            <Card key={f.id}>
              <div className="flex items-center justify-between mb-3"><div className="font-semibold">{f.name}</div><button onClick={() => removeChallenge(f.id)} className="text-slate-500 hover:text-red-400"><Icon name="trash" size={15} /></button></div>
              <div className="text-xs text-slate-500 mb-2">{fmtMoney(f.accountSize)} account · linked trades: {e.tradeCount}</div>
              <ProgressBar value={e.profitTarget > 0 ? (e.currentProfit / e.profitTarget) * 100 : 0} colorClass="bg-amber-400" />
              <div className="grid grid-cols-2 gap-2 mt-3 text-sm">
                <div><div className="text-slate-500 text-xs">Remaining Profit</div><div className="font-mono">{fmtMoney(e.remainingProfit)}</div></div>
                <div><div className="text-slate-500 text-xs">Remaining Drawdown</div><div className="font-mono">{fmtMoney(e.remainingDrawdown)}</div></div>
                <div><div className="text-slate-500 text-xs">Days Remaining</div><div className="font-mono">{e.daysRemaining}</div></div>
                <div><div className="text-slate-500 text-xs">Daily Target Needed</div><div className="font-mono">{isFinite(e.dailyTargetNeeded) ? fmtMoney(e.dailyTargetNeeded) : "—"}</div></div>
              </div>
              <div className="mt-3 pt-3 border-t border-slate-800 flex items-center justify-between">
                <span className="text-xs text-slate-500">Estimated pass probability</span>
                <span className={cls("font-mono font-semibold", e.probability >= 60 ? "text-emerald-400" : e.probability >= 30 ? "text-amber-400" : "text-red-400")}>{e.probability.toFixed(0)}%</span>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ------------------------------------ settings ------------------------------------- */

function SettingsPanel({ settings, setSettings, trades, funding, onImport, showToast }) {
  const [form, setForm] = useState(settings);
  const inputClass = "w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 outline-none focus:border-amber-400";
  const labelClass = "text-xs text-slate-500 mb-1 block";

  function save(e) { e.preventDefault(); setSettings({ ...form, monthlyTarget: Number(form.monthlyTarget), maxDailyLoss: Number(form.maxDailyLoss), maxWeeklyLoss: Number(form.maxWeeklyLoss), maxMonthlyLoss: Number(form.maxMonthlyLoss) }); showToast("Settings saved."); }
  function exportData() {
    const blob = new Blob([JSON.stringify({ trades, settings, funding }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `trading-journal-backup-${todayISO()}.json`; a.click(); URL.revokeObjectURL(url);
  }
  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { onImport(JSON.parse(reader.result)); } catch (err) { showToast("Import failed — invalid file."); } };
    reader.readAsText(file); e.target.value = "";
  }

  return (
    <div className="flex flex-col gap-5 max-w-2xl">
      <h1 className="text-xl font-bold tracking-tight">Settings</h1>
      <Card>
        <div className="font-medium mb-3 flex items-center gap-2"><Icon name="target" size={16} className="text-amber-400" /> Goals & Risk Limits</div>
        <form onSubmit={save} className="grid grid-cols-2 gap-3">
          <div className="col-span-2"><label className={labelClass}>Monthly Profit Target ($)</label><input type="number" value={form.monthlyTarget} onChange={(e) => setForm({ ...form, monthlyTarget: e.target.value })} className={inputClass} /></div>
          <div><label className={labelClass}>Max Daily Loss ($)</label><input type="number" value={form.maxDailyLoss} onChange={(e) => setForm({ ...form, maxDailyLoss: e.target.value })} className={inputClass} /></div>
          <div><label className={labelClass}>Max Weekly Loss ($)</label><input type="number" value={form.maxWeeklyLoss} onChange={(e) => setForm({ ...form, maxWeeklyLoss: e.target.value })} className={inputClass} /></div>
          <div className="col-span-2"><label className={labelClass}>Max Monthly Loss ($)</label><input type="number" value={form.maxMonthlyLoss} onChange={(e) => setForm({ ...form, maxMonthlyLoss: e.target.value })} className={inputClass} /></div>
          <label className="col-span-2 flex items-center gap-2 text-sm text-slate-300 mt-1"><input type="checkbox" checked={form.lockOnBreach} onChange={(e) => setForm({ ...form, lockOnBreach: e.target.checked })} className="accent-amber-400" /><Icon name="lock" size={13} /> Lock new trades when a risk limit is breached</label>
          <button type="submit" className="col-span-2 mt-2 py-2.5 rounded-lg bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold text-sm">Save Settings</button>
        </form>
      </Card>
      <Card>
        <div className="font-medium mb-3 flex items-center gap-2"><Icon name="download" size={16} className="text-amber-400" /> Backup & Restore</div>
        <p className="text-sm text-slate-500 mb-3">Data is currently saved in this browser only (localStorage). Export a backup file regularly, or connect your own backend (see the DataStore comment at the top of this file) for real cross-device sync.</p>
        <div className="flex flex-wrap gap-2">
          <button onClick={exportData} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm px-3 py-2 rounded-lg"><Icon name="download" size={14} /> Export Backup</button>
          <label className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm px-3 py-2 rounded-lg cursor-pointer"><Icon name="upload" size={14} /> Import Backup<input type="file" accept="application/json" onChange={importData} className="hidden" /></label>
        </div>
      </Card>
      <Card>
        <div className="font-medium mb-1 flex items-center gap-2"><Icon name="rotate" size={16} className="text-red-400" /> Reset</div>
        <p className="text-sm text-slate-500 mb-3">Permanently delete all trades, settings, and funding challenges from this browser.</p>
        <button onClick={() => { if (confirm("This will permanently delete all data. Continue?")) onImport({ trades: [], settings: DEFAULT_SETTINGS, funding: [] }); }} className="text-sm text-red-400 border border-red-500/30 hover:bg-red-500/10 px-3 py-2 rounded-lg">Reset All Data</button>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
